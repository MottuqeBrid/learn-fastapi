<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learn FastAPI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-start: #f7f4ef;
        --bg-end: #e8f3f2;
        --ink: #17231f;
        --muted: #4a5f59;
        --card: #ffffffcc;
        --accent: #0f766e;
        --accent-2: #14b8a6;
        --ring: #99f6e4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--ink);
        font-family: "Manrope", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 10% 15%, #ffffff 0%, transparent 38%),
          radial-gradient(circle at 90% 85%, #cffafe 0%, transparent 34%),
          linear-gradient(140deg, var(--bg-start), var(--bg-end));
      }

      .card {
        width: min(760px, 100%);
        border: 1px solid #d9ece8;
        border-radius: 24px;
        padding: clamp(24px, 5vw, 48px);
        background: var(--card);
        backdrop-filter: blur(10px);
        box-shadow:
          0 10px 30px #0f766e1f,
          0 2px 10px #0f172a14;
        animation: rise 700ms ease-out both;
      }

      .eyebrow {
        display: inline-block;
        margin: 0 0 14px;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
        background: #ccfbf1;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3.4rem);
        line-height: 1.08;
        letter-spacing: -0.03em;
      }

      p {
        margin: 18px 0 0;
        max-width: 62ch;
        color: var(--muted);
        line-height: 1.65;
        font-size: clamp(1rem, 2vw, 1.12rem);
      }

      .actions {
        margin-top: 30px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 11px 18px;
        border-radius: 12px;
        border: 1px solid transparent;
        text-decoration: none;
        font-weight: 700;
        transition:
          transform 180ms ease,
          box-shadow 180ms ease,
          border-color 180ms ease;
      }

      .btn-primary {
        color: #ffffff;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        box-shadow: 0 10px 22px #0f766e40;
      }

      .btn-secondary {
        color: var(--ink);
        background: #ffffff;
        border-color: #cce7e3;
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      .btn:focus-visible {
        outline: 3px solid var(--ring);
        outline-offset: 2px;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.99);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @media (max-width: 540px) {
        .card {
          border-radius: 18px;
        }

        .actions {
          flex-direction: column;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="eyebrow">FastAPI Demo</span>
      <h1>Welcome to FastAPI</h1>
      <p>
        This polished starter page is served by your FastAPI app. Use it as a
        clean base for routes, templates, and API-driven UI experiments.
      </p>
      <div class="actions">
        <a class="btn btn-primary" href="/docs">Open API Docs</a>
        <a class="btn btn-secondary" href="/redoc">View ReDoc</a>
      </div>
    </main>
  </body>
</html>
